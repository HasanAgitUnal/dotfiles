# General settings
general.import=["~/.config/alacritty/colors.toml"]
general.ipc_socket=false

[window]
padding={ x=10, y=10 }
dynamic_padding=false
decorations="None"
opacity=0.9
blur=true
startup_mode="Windowed"

[scrolling]
multiplier=1

[font]
normal={ family="CaskaydiaCove Nerd Font", style="Regular" }
size=9
builtin_box_drawing=true

[cursor]
style={ shape="Block", blinking="on" }
blink_interval=600
blink_timeout=0

[terminal]
shell={ program="/bin/bash", args=[] }

[mouse]
hide_when_typing=true

[keyboard]
bindings=[
        { key="+", mods="Control|Shift", action="IncreaseFontSize" },
        { key="J", mods="Alt", action="ScrollLineDown" },
        { key="K", mods="Alt", action="ScrollLineUp" }
]
