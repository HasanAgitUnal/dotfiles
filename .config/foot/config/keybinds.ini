[key-bindings]
scrollback-up-line=Mod1+k
scrollback-down-line=Mod1+j
scrollback-home=Mod1+Shift+g
scrollback-end=Mod1+g
clipboard-copy=Mod1+y
clipboard-paste=Mod1+p
primary-paste=Mod1+v
search-start=Mod1+f
show-urls-launch=Mod1+u
pipe-scrollback=[sh -c "temp=$(mktemp); cat > \"$temp\" && footclient -e nvim \"$temp\""] Alt+e
