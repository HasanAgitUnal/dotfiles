#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = tr
    kb_variant =
    kb_model =
    repeat_rate = 50
    repeat_delay = 300
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

## Refresh Waybar
bind = $mainMod, W, exec, kill -12 $(pidof waybar)

## Kill app
bind = $mainMod, BackSpace, killactive,

## Floating
bind = $mainMod, F, togglefloating,

## Split horizontal <-> vertical toggle
bind = $mainMod, S, layoutmsg, togglesplit

## Apps
bind = $mainMod, Space, exec, $menu
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, exec, $fileManagerTUI
bind = $mainMod, B, exec, $browser
bind = $mainMod, U, exec, $helium

## Move focus with mainMod + hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

## Move window within workspace with mainMod + ALT + hjkl
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d

## Switch workspaces with mainMod + jk
bind = $mainMod CTRL, H, workspace, e-1
bind = $mainMod CTRL, L, workspace, e+1

## Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

## Move windowa to workspace with mainMod + SHIFT + jk
bind = $mainMod SHIFT, H, movetoworkspace, -1
bind = $mainMod SHIFT, L, movetoworkspace, +1

## Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

## Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

## Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioMute, exec, $osd mute-volume
bindel = ,XF86AudioMicMute, exec, $osd mute-mic

bindel = ,XF86AudioRaiseVolume, exec, $osd volume +5
bindel = ,XF86AudioLowerVolume, exec, $osd volume -5

bindel = SHIFT ,XF86AudioRaiseVolume, exec, $osd volume +1
bindel = SHIFT ,XF86AudioLowerVolume, exec, $osd volume -1

bindel = ,XF86MonBrightnessUp, exec, $osd brightness +5
bindel = ,XF86MonBrightnessDown, exec, $osd brightness -5

bindel = SHIFT ,XF86MonBrightnessUp, exec, $osd brightness +1
bindel = SHIFT ,XF86MonBrightnessDown, exec, $osd brightness -1

## Playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

## Screenshots
# prtscr : screen -> file
bind = , Print, exec, grim -g "$(slurp)" ~/media/screenshots/$(date +'%d-%m-%Y_%H-%M-%S').png && notify-send "Saved selection to file"
# alt + prtscr : select -> clipboard
bind = MOD1, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Saved selection to clipboard"
# super + prtscr : screen -> file
bind = SUPER, Print, exec, grim ~/media/screenshots/$(date +'%d-%m-%Y_%H-%M-%S').png && notify-send "Saved screen to file"
# super + alt + prtscr :  screen -> clipboard
bind = SUPER_MOD1, Print, exec, grim - | wl-copy && notify-send "Saved screen to clipboard"

## Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -i -p "Clipboard" | cliphist decode | wl-copy
