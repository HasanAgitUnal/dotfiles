#
# Visual Settings
#

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(33335577) rgba(55559977) 315deg
    col.inactive_border = rgba(22222899)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2

    active_opacity = 0.9
    inactive_opacity = 0.6
    dim_inactive = true
    dim_strength = 0.06

    shadow {
        enabled = true
        range = 6
        render_power = 5
        color = rgba(111117cc)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}



