#
# Autostart
#

# I dont remember why I added this
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && hyprshade auto

exec-once = swaybg -i ~/dotfiles/images/wallpaper.jpg -m fill
exec-once = hyprctl setcursor LyraB-cursors 32
exec-once = waybar
exec-once = dunst
exec-once = foot --server
exec-once = mkdir -p /tmp/gemini # gemini will dont access home directory with read/write file tools

# Clipboard
exec-once = cliphist wipe
exec-once = wl-paste --type text --watch cliphist -max-items 100 store
exec-once = wl-paste --type image --watch cliphist -max-items 100 store

# Startup Sound
exec-once = sh -c 'sleep 2 && mpv $sound_theme/stereo/desktop-login.*'
