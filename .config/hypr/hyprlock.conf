general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/dotfiles/images/wallpaper.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.27
    dots_spacing = 0.25
    outer_color = rgb(151515)
    inner_color = rgba(17, 17, 23, 0.7)
    font_color = rgba(107, 199, 221, 0.8)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    hide_input = false
    halign = center
    valign = center
}
