[global]
width = 105
height = (105, 105)
notification_limit = 10
origin = center
frame_width = 2
padding = 10
font = Caskaydia Cove NF 30
corner_radius = 6
hide_duplicate_count = true
format = "%s"
timeout = 1
markup = full
alignment = center
vertical_alignment = center

[urgency_normal]
background = "#111117bb"
foreground = "#6BC7DD"
frame_color = "#171720ee"

[sound_msg]
format = "<span size='12500' rise='-1000'>%s</span> %b"
